name: Build GhostSSH

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{matrix.os}}

    strategy: 
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Build GhostSSH
      run: |
        if [ "$RUNNER_OS" = "macOS" ]; then 
          make build \
            CC=gcc \
            BIN=bin/ghost-macos-arm64 \
            CFLAGS="-Wall -Wextra -g -DMG_TLS=MG_TLS_OPENSSL -I$(brew --prefix openssl)/include" \
            LDFLAGS="-L$(brew --prefix openssl)/lib -lssl -lcrypto"
          else 
            make 
          fi
    - name: Make test script executable
      run: chmod +x test/test-cli.sh

    - name: Run CLI test
      env:
        GHOST: "./bin/ghost-linux-amd64"
      run: ./test/test-cli.sh
